name: Package Release

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build ("main" = build only)'
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  extension:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: kde
            script: ./scripts/build_kde_embed.sh
            artifact: waywallen-kde
            pattern: build/waywallen-kde-*.zip
            packages: >-
              cmake ninja-build g++ pkg-config
              qt6-base-dev qt6-declarative-dev
              libegl-dev libgles-dev libvulkan-dev
          - name: gnome
            script: ./scripts/build_gnome_zip.sh
            artifact: waywallen-gnome
            pattern: build/waywallen-gnome-*.zip
            packages: >-
              cmake ninja-build g++ pkg-config
              libgtk-4-dev libglib2.0-dev
              gobject-introspection libgirepository1.0-dev
              gir1.2-gtk-4.0
              libvulkan-dev libegl-dev libgles-dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.packages }}

      - name: Build ${{ matrix.name }} extension
        run: ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.pattern }}
          if-no-files-found: error

  layer-shell:
    name: Build layer-shell
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config libegl-dev libgles-dev libvulkan-dev

      - name: Build waywallen-layer-shell
        run: cargo build --bin waywallen-layer-shell --release --locked

      - name: Package waywallen-layer-shell
        run: |
          version=$(
            cargo metadata --no-deps --format-version 1 \
              | python3 -c 'import json, sys; data = json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p["name"] == "waywallen-display"))'
          )
          arch=$(uname -m)
          mkdir -p dist
          tar -C target/release -czf "dist/waywallen-layer-shell-${version}-${arch}.tar.gz" waywallen-layer-shell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: waywallen-layer-shell
          path: dist/waywallen-layer-shell-*.tar.gz
          if-no-files-found: error

  create-release:
    name: Create release
    needs:
      - extension
      - layer-shell
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Determine release
        id: rel
        run: |
          REF="${{ inputs.tag || github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ] || [[ "$REF" == v* ]]; then
            echo "tag=$REF" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.rel.outputs.is_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.rel.outputs.tag }}
          artifacts: dist/*
          immutableCreate: true
          skipIfReleaseExists: true
